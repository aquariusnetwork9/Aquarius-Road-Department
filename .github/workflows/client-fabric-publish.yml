name: client-fabric Publish

# STANDING ORDER: GitHub Actions is the ONLY thing allowed to build a released jar for this
# project -- never hand-upload a locally-built artifact. Local builds are for testing only
# (see client-fabric/README.md "Status").
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: client-fabric

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Elevate wrapper permissions
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          dependency-graph: generate-and-submit

      - name: Build Mod
        run: ./gradlew build

      - name: Upload Mod Artifact
        uses: actions/upload-artifact@v7
        with:
          name: client-fabric
          path: client-fabric/build/libs/*.jar
          if-no-files-found: error

      - name: Get Mod + MC Version
        run: |
          echo "MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV
          echo "MC_VERSION=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV

      # Tag is namespaced (client-fabric-v...) since this is a monorepo shared with the server,
      # website, discord-bot, and the two proxy plugins -- each component's releases must not
      # collide in the same tag/version space. The MC version is embedded too (Fabric API's own
      # convention, e.g. 0.141.5+1.21.11) since this mod's own version doesn't change between
      # MC-version ports -- without it, every MC target would collide on the same bare tag.
      - name: Publish Mod Github Release
        uses: ncipollo/release-action@v1
        with:
          tag: client-fabric-v${{ env.MOD_VERSION }}+${{ env.MC_VERSION }}
          artifacts: client-fabric/build/libs/*.jar
          generateReleaseNotes: true
