name: plugin-aquarius Publish

# STANDING ORDER: GitHub Actions is the ONLY thing allowed to build a released jar for this
# project -- never hand-upload a locally-built artifact. Local builds are for VPS/client test
# staging only (see plugin-aquarius/README.md "Status").
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: plugin-aquarius

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Download AquariusProxy API jar
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p libs
          MC=$(grep '^mc=' gradle.properties | cut -d'=' -f2)
          TAG=$(gh release list --repo aquariusnetwork9/AquariusProxy --limit 100 --json tagName -q '.[].tagName' \
                | grep -E "\+java\.${MC}\$" | head -1)
          if [ -z "$TAG" ]; then
            echo "No +java.${MC} AquariusProxy release found" >&2; exit 1
          fi
          echo "Compiling against AquariusProxy $TAG"
          gh release download "$TAG" --repo aquariusnetwork9/AquariusProxy --pattern 'AquariusProxy.jar' --dir libs --clobber

      - name: Elevate wrapper permissions
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          dependency-graph: generate-and-submit

      - name: Build Plugin
        run: ./gradlew build

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v7
        with:
          name: plugin-aquarius
          path: plugin-aquarius/build/libs/*.jar
          if-no-files-found: error

      - name: Get Plugin Version
        run: echo "PLUGIN_VERSION=$(grep '^plugin_version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV

      # Tag is namespaced (plugin-aquarius-v...) since this is a monorepo shared with the
      # server, website, discord-bot, and (eventually) a plugin-zenith counterpart -- each
      # component's releases must not collide in the same tag/version space.
      - name: Publish Plugin Github Release
        uses: ncipollo/release-action@v1
        with:
          tag: plugin-aquarius-v${{ env.PLUGIN_VERSION }}
          artifacts: plugin-aquarius/build/libs/*.jar
          generateReleaseNotes: true
